name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SmartRAG from GitHub
        run: pip install git+https://github.com/SaidoLabsLLC/SmartRAG.git
      - name: Install Saido Agent
        run: pip install -e .
      - name: Compile check
        run: python -m compileall saido_agent/ -q

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SmartRAG from GitHub
        run: pip install git+https://github.com/SaidoLabsLLC/SmartRAG.git
      - name: Install Saido Agent with test deps
        run: pip install -e . && pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t saido-agent:${{ github.sha }} .
      - name: Verify health check
        run: |
          docker run -d --name saido-test -p 8000:8000 saido-agent:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop saido-test
          docker rm saido-test
